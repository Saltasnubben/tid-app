name: Deploy TidRapport

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.astronauten.se
          username: astronauten.se
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /tid/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            index.html
            vite.config.js
            package*.json
            .github/**
