<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Stopwatch body (circle) -->
  <circle cx="32" cy="38" r="18" fill="none" stroke="#3b82f6" stroke-width="3.5"/>
  <!-- Inner fill -->
  <circle cx="32" cy="38" r="14.5" fill="#1e293b"/>
  <!-- Crown (top button) -->
  <rect x="28.5" y="12" width="7" height="4" rx="2" fill="#3b82f6"/>
  <!-- Stem -->
  <rect x="30.5" y="16" width="3" height="5" rx="1.5" fill="#3b82f6"/>
  <!-- Side button -->
  <rect x="44" y="24" width="5" height="3" rx="1.5" fill="#64748b"/>
  <!-- Clock hands -->
  <line x1="32" y1="38" x2="32" y2="25" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="41" y2="43" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="38" r="2" fill="#f1f5f9"/>
  <!-- Tick marks -->
  <line x1="32" y1="22" x2="32" y2="24.5" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="51.5" x2="32" y2="54" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="38" x2="19.5" y2="38" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44.5" y1="38" x2="47" y2="38" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
</svg>
